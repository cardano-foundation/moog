name: Build tarballs

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  linux-tarball:
    name: Build and upload linux tarball
    runs-on: ubuntu-latest
    steps:
      - run: sudo rm -rf /opt&
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            substituters = https://cache.iog.io https://cache.nixos.org/
            accept-flake-config = true
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build linux tarball
        run: nix --quiet build -L .#linux64.tarball -o linux-tarball
      - name: Smoke test tarball binaries
        run: |
          mkdir -p /tmp/tarball-test
          tar -xzf linux-tarball/*.tar.gz -C /tmp/tarball-test
          /tmp/tarball-test/moog --help
          /tmp/tarball-test/moog-oracle --help
          /tmp/tarball-test/moog-agent --help
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-tarball
          path: ./linux-tarball
  linux-aarch64-tarball:
    name: Build and upload linux aarch64 tarball
    runs-on: ubuntu-24.04-arm
    steps:
      - run: sudo rm -rf /opt&
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            substituters = https://cache.iog.io https://cache.nixos.org/
            accept-flake-config = true
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build ARM64 linux tarball
        run: nix --quiet build -L .#linux-aarch64.tarball -o linux-aarch64-tarball
      - name: Smoke test tarball binaries
        run: |
          mkdir -p /tmp/tarball-test
          tar -xzf linux-aarch64-tarball/*.tar.gz -C /tmp/tarball-test
          /tmp/tarball-test/moog --help
          /tmp/tarball-test/moog-oracle --help
          /tmp/tarball-test/moog-agent --help
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: linux-aarch64-tarball
          path: ./linux-aarch64-tarball
  macos-tarball:
    name: Build and upload macOS tarball
    runs-on: macos-latest
    steps:
      - run: sudo rm -rf /opt&
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            substituters = https://cache.iog.io https://cache.nixos.org/
            accept-flake-config = true
      - uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build macOS tarball
        run: nix --quiet build .#darwin64.tarball -o darwin-tarball
      - name: Smoke test tarball binaries
        run: |
          mkdir -p /tmp/tarball-test
          tar -xzf darwin-tarball/*.tar.gz -C /tmp/tarball-test
          /tmp/tarball-test/moog --help
          /tmp/tarball-test/moog-oracle --help
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: darwin-tarball
          path: ./darwin-tarball
  macos-homebrew-artifacts:
    name: Build and test macOS Homebrew artifacts
    if: github.event_name == 'pull_request'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            substituters = https://cache.iog.io https://cache.nixos.org/
            accept-flake-config = true
      - name: Build and smoke test Homebrew artifacts
        uses: paolino/dev-assets/darwin-homebrew-release@spike/darwin-homebrew-action
        with:
          mode: dev-homebrew
          update-tap: "no"
          release-package: darwin-release-artifacts
          dev-package: darwin-dev-homebrew-artifacts
          release-formula: moog.rb
          dev-formula: moog-dev.rb
          release-artifact-name: darwin-release-bundle
          dev-artifact-name: darwin-dev-homebrew-artifacts
          tarball-pattern: moog-*-aarch64-darwin.tar.gz
          installed-commands: moog moog-oracle moog-agent
          cleanup-formulae: moog moog-dev
          tap-name: cardano-foundation/moog
          tap-repository: cardano-foundation/moog
          tarball-smoke-script: |
            moog --help
            moog-oracle --help
            moog-agent --help
          brew-smoke-script: |
            moog --help
            moog-oracle --help
            moog-agent --help
            test -x "$(command -v moog)"
            otool -L "$(which moog)"
