name: Docs preview

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - moog-v2
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: >-
    ${{
      github.workflow
    }}-${{
      github.event_name == 'pull_request'
        && format('pr-{0}', github.event.pull_request.number)
        || github.ref
    }}
  cancel-in-progress: false

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: nixos
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/cachix-action@v17
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build docs
        env:
          MKDOCS_SITE_URL: >-
            ${{
              github.event_name == 'pull_request'
                && format(
                    'https://preview.dev.plutimus.com/{0}/pr-{1}/',
                    github.repository,
                    github.event.pull_request.number
                  )
                || 'https://cardano-foundation.github.io/moog/'
            }}
        run: >-
          nix develop github:paolino/dev-assets?dir=mkdocs
          -c mkdocs build --strict --site-dir site
      - name: Publish PR preview
        if: github.event_name == 'pull_request'
        uses: paolino/dev-assets/static-preview@main
        with:
          path: site
      - name: Clean up site/
        if: always()
        run: |
          chmod -R u+w site 2>/dev/null || true
          rm -rf site

  pr-preview-cleanup:
    name: Remove PR Preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: nixos
    steps:
      - uses: paolino/dev-assets/static-preview@main
        with:
          mode: cleanup
