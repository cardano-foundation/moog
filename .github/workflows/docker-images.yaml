name: Build docker images

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - moog-v2

jobs:
  build:
    name: Build and upload docker image
    runs-on: ubuntu-latest
    steps:
      - run: sudo rm -rf /opt&
      - uses: actions/checkout@v6
      - uses: paolino/dev-assets/setup-nix@v0.1.0
        with:
          cachix-auth-token: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build oracle docker image
        run: nix --quiet build .#moog-oracle-docker-image -o moog-oracle-image
      - name: Smoke test oracle docker image
        run: |
          IMAGE=$(docker load < moog-oracle-image | grep "Loaded image:" | awk '{print $3}')
          docker run --rm "$IMAGE" --help
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: moog-oracle-image
          path: ./moog-oracle-image
      - name: Build agent docker image
        run: nix --quiet build .#moog-agent-docker-image -o moog-agent-image
      - name: Smoke test agent docker image
        run: |
          IMAGE=$(docker load < moog-agent-image | grep "Loaded image:" | awk '{print $3}')
          docker run --rm "$IMAGE" --help
      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: moog-agent-image
          path: ./moog-agent-image
      - name: Build Antithesis proxy docker image
        run: nix --quiet build .#moog-antithesis-proxy-docker-image -o moog-antithesis-proxy-image
      - name: Smoke test Antithesis proxy docker image
        run: |
          IMAGE=$(docker load < moog-antithesis-proxy-image | grep "Loaded image:" | awk '{print $3}')
          printf '%s\n' test-api-key > antithesis-api-key
          CID=$(docker run -d -p 127.0.0.1::8080 \
            -v "$PWD/antithesis-api-key:/run/secrets/antithesis-api-key:ro" \
            "$IMAGE")
          trap 'docker logs "$CID"; docker rm -f "$CID"' EXIT
          PORT=$(docker port "$CID" 8080/tcp | sed 's/.*://')
          for _ in $(seq 1 20); do
            if curl -fsS "http://127.0.0.1:$PORT/healthz" | grep -x ok; then
              exit 0
            fi
            sleep 1
          done
          exit 1
      - name: Upload Antithesis proxy artifact
        uses: actions/upload-artifact@v6
        with:
          name: moog-antithesis-proxy-image
          path: ./moog-antithesis-proxy-image
  build-aarch64:
    name: Build and upload ARM64 docker images
    runs-on: ubuntu-24.04-arm
    steps:
