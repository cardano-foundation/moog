name: ARC docker probe

# Throwaway: find out HOW docker is exposed on nix-enabled-runners,
# since `docker build` defaulted to a missing unix:///var/run/docker.sock.
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  docker-probe:
    name: Probe docker on nix-enabled-runners
    runs-on: nix-enabled-runners
    steps:
      - name: Discover the docker endpoint
        run: |
          set +e
          echo "== uid/whoami =="; id; echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR"
          echo "== DOCKER_* env =="; env | grep -i docker || echo "(no DOCKER_* in env)"
          echo "== which docker =="; command -v docker; docker --version 2>&1
          echo "== candidate sockets =="
          for s in /var/run/docker.sock /run/docker.sock /run/user/*/docker.sock /var/run/docker/docker.sock; do
            ls -la "$s" 2>&1
          done
          echo "== docker context ls =="; docker context ls 2>&1
          echo "== docker info (default endpoint) =="; docker info 2>&1 | head -40
          echo "== docker ps (default endpoint) =="; docker ps 2>&1
          for h in tcp://localhost:2375 tcp://localhost:2376 unix:///run/docker.sock; do
            echo "== try DOCKER_HOST=$h =="
            DOCKER_HOST="$h" docker info --format '{{.ServerVersion}} / {{.OperatingSystem}}' 2>&1 | head -5
          done
          echo "== probe done =="
          exit 0
